<div class="danu-status-bar">
  <div class="danu-status-header" id="danu-header">
    <span class="danu-item">
      <span class="danu-label">⚡</span>
      <span id="danu-connection" class="danu-value">Connecting</span>
    </span>
    <span class="danu-item">
      <span class="danu-label">Nodes:</span>
      <span id="danu-nodes" class="danu-value">0/0</span>
    </span>
    <span class="danu-item">
      <span class="danu-label">DHT:</span>
      <span id="danu-dht" class="danu-value">-</span>
    </span>
    <span class="danu-item">
      <span class="danu-label">Node:</span>
      <span id="danu-node-name" class="danu-value">-</span>
    </span>
    <span class="danu-item">
      <span class="danu-label">Storage:</span>
      <span id="danu-storage" class="danu-value">-</span>
    </span>
    <span class="danu-expand" id="danu-expand-icon">▼</span>
  </div>
  <div class="danu-status-details" id="danu-details">
    <div class="danu-section">
      <div class="danu-section-title">Node Info</div>
      <div class="danu-detail-row">
        <span class="danu-detail-label">ID:</span>
        <span id="danu-node-id" class="danu-detail-value">-</span>
      </div>
    </div>
    <div class="danu-section">
      <div class="danu-section-title">DHT Connections</div>
      <div id="danu-node-list" class="danu-list">None</div>
    </div>
    <div class="danu-section">
      <div class="danu-section-title">Stored Pages</div>
      <div id="danu-page-list" class="danu-list">None</div>
    </div>
  </div>
</div>
